<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Packet Picker</title>
<meta name="theme-color" content="#E4517A" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Packets" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#EEF3F2;
    --card:#FFFFFF;
    --ink:#382a37;
    --ink-soft:#7c6b7a;
    --line:#e3e9e8;
    --berry:#E4517A;
    --berry-deep:#c73c64;
    --teal:#3FA79A;
    --teal-soft:#e4f2f0;
    --lemon:#F2B93B;
    --shadow:0 10px 30px -14px rgba(56,42,55,.28);
    --shadow-sm:0 4px 14px -8px rgba(56,42,55,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Nunito Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:
      radial-gradient(120% 80% at 85% -10%, #fbe7ee 0%, rgba(251,231,238,0) 55%),
      radial-gradient(120% 80% at -10% 0%, #dff0ed 0%, rgba(223,240,237,0) 55%),
      var(--paper);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding-bottom:88px;
  }
  h1,h2,h3,.disp{font-family:"Baloo 2",system-ui,sans-serif;margin:0}
  .wrap{max-width:960px;margin:0 auto;padding:0 16px}

  /* Header */
  header{padding:22px 0 6px}
  .brandrow{display:flex;align-items:center;gap:12px}
  .mark{
    width:44px;height:44px;flex:0 0 44px;border-radius:14px;
    background:linear-gradient(150deg,var(--berry),var(--berry-deep));
    display:grid;place-items:center;font-size:24px;box-shadow:var(--shadow-sm);
  }
  h1{font-size:29px;font-weight:800;letter-spacing:-.5px;line-height:1}
  .tag{color:var(--ink-soft);font-weight:600;font-size:14px;margin-top:3px}
  .count{margin-left:auto;text-align:right;font-weight:700;color:var(--teal);font-size:13px;line-height:1.2}
  .count b{display:block;font-family:"Baloo 2";font-size:22px;color:var(--ink)}

  /* Action bar */
  .actions{display:flex;gap:10px;margin:16px 0 12px}
  .search{flex:1;position:relative}
  .search input{
    width:100%;border:1.5px solid var(--line);background:var(--card);
    border-radius:14px;padding:13px 14px 13px 40px;font:inherit;font-weight:600;color:var(--ink);
  }
  .search input::placeholder{color:#b3a7b1;font-weight:600}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5}
  .search input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}

  .btn{border:none;font:inherit;font-weight:800;font-family:"Baloo 2";border-radius:14px;cursor:pointer;transition:transform .08s ease,box-shadow .15s,filter .15s;display:inline-flex;align-items:center;justify-content:center;gap:7px}
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn.pour{background:linear-gradient(150deg,var(--berry),var(--berry-deep));color:#fff;padding:13px 18px;font-size:16px;box-shadow:var(--shadow-sm);white-space:nowrap}
  .btn.add{background:var(--card);color:var(--ink);border:1.5px solid var(--line);width:48px;font-size:22px;padding:0}
  .btn.pour:hover{filter:brightness(1.04)}

  /* Filters */
  .filters{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow-sm);margin-bottom:16px}
  .frow{margin-bottom:13px}
  .frow:last-child{margin-bottom:0}
  .flabel{font-family:"Baloo 2";font-weight:700;font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{
    border:1.5px solid var(--line);background:#fafbfb;color:var(--ink-soft);
    border-radius:999px;padding:7px 12px;font:inherit;font-weight:700;font-size:13px;cursor:pointer;
    display:inline-flex;align-items:center;gap:5px;transition:.12s;
  }
  .chip:active{transform:scale(.96)}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .subrow{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:6px}
  .field.grow{flex:1;min-width:150px}
  select,.rng{font:inherit;font-weight:700;color:var(--ink)}
  select{border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:10px 12px}
  select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;cursor:pointer;user-select:none;padding:6px 0}
  .toggle input{position:absolute;opacity:0;pointer-events:none}
  .track{width:42px;height:24px;border-radius:999px;background:#dfe5e4;position:relative;transition:.18s;flex:0 0 42px}
  .track::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.18s}
  .toggle input:checked + .track{background:var(--teal)}
  .toggle input:checked + .track::after{transform:translateX(18px)}
  .toggle input:focus-visible + .track{box-shadow:0 0 0 3px var(--teal-soft)}
  .rng{width:100%;accent-color:var(--berry)}
  .rngval{font-family:"Baloo 2";color:var(--berry-deep)}
  .toggle-block{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .toggle-col{display:flex;flex-direction:column;gap:12px;align-items:flex-start}
  .clear{margin-left:auto;background:none;border:none;color:var(--berry-deep);font:inherit;font-weight:800;font-family:"Baloo 2";cursor:pointer;font-size:13px}

  /* Grid + cards */
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr}}
  .card{
    background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:15px 15px 13px;
    box-shadow:var(--shadow-sm);position:relative;display:flex;flex-direction:column;gap:9px;
    transition:box-shadow .2s,border-color .2s,transform .2s;
  }
  .card.spot{border-color:var(--berry);box-shadow:0 0 0 3px rgba(228,81,122,.16),var(--shadow);animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(.96)}55%{transform:scale(1.015)}100%{transform:scale(1)}}
  .eyebrow{font-family:"Baloo 2";font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--teal)}
  .eyebrow.none{color:#c3b9c1}
  .flavor{font-family:"Baloo 2";font-weight:700;font-size:20px;line-height:1.12;letter-spacing:-.3px;text-transform:capitalize}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pchip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 10px;font-weight:800;font-size:12px;font-family:"Baloo 2"}
  .badge{border-radius:999px;padding:4px 9px;font-weight:800;font-size:11px;font-family:"Baloo 2";background:var(--teal-soft);color:#2c7d72;letter-spacing:.2px}
  .badge.dye{background:#f6ecf5;color:#9a4f92}
  .rate{display:flex;align-items:center;gap:10px;margin-top:2px}
  .score{font-family:"Baloo 2";font-weight:800;font-size:20px;line-height:1;min-width:44px}
  .bar{flex:1;height:9px;border-radius:999px;background:#eef1f0;overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--lemon),var(--berry))}
  .out5{color:var(--ink-soft);font-weight:700;font-size:12px}
  .notes{color:var(--ink-soft);font-weight:600;font-size:14px;line-height:1.35}
  .cardbtns{position:absolute;top:12px;right:12px;display:flex;gap:4px;opacity:.55}
  .card:hover .cardbtns{opacity:1}
  .icobtn{width:30px;height:30px;border-radius:9px;border:none;background:#f4f1f3;cursor:pointer;font-size:14px;display:grid;place-items:center;color:var(--ink-soft)}
  .icobtn:hover{background:#ece7ec;color:var(--ink)}

  .empty{text-align:center;padding:54px 20px;color:var(--ink-soft)}
  .empty .big{font-family:"Baloo 2";font-size:44px}
  .empty h3{font-size:20px;margin:8px 0 4px;color:var(--ink)}

  /* Footer bar */
  .footbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-top:1.5px solid var(--line);padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));z-index:20}
  .footbar .wrap{display:flex;gap:10px;align-items:center}
  .link{background:none;border:none;color:var(--ink-soft);font:inherit;font-weight:800;font-family:"Baloo 2";cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:5px}
  .link:hover{color:var(--ink)}
  .foot-count{margin-left:auto;color:var(--ink-soft);font-weight:700;font-size:13px}

  /* Modal */
  .scrim{position:fixed;inset:0;background:rgba(43,30,42,.42);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .scrim.on{display:flex}
  @media(min-width:620px){.scrim{align-items:center}}
  .sheet{background:var(--paper);width:100%;max-width:540px;border-radius:22px 22px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,.25);max-height:92vh;overflow:auto}
  @media(min-width:620px){.sheet{border-radius:22px}}
  .sheet h2{font-size:23px;font-weight:800;margin-bottom:2px}
  .sheet .sub{color:var(--ink-soft);font-weight:600;font-size:14px;margin-bottom:16px}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-family:"Baloo 2";font-weight:700;font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .fld input[type=text],.fld textarea,.fld select{width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:12px;font:inherit;font-weight:600;color:var(--ink)}
  .fld textarea{resize:vertical;min-height:64px}
  .fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
  .two{display:flex;gap:12px}
  .two>*{flex:1}
  .stars{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
  .star{cursor:pointer;font-size:26px;line-height:1;color:#dcdad9;position:relative;width:28px;text-align:center}
  .star .half{position:absolute;left:0;top:0;width:50%;overflow:hidden;color:var(--lemon)}
  .star.full{color:var(--lemon)}
  .ratenum{font-family:"Baloo 2";font-weight:800;font-size:18px;color:var(--berry-deep);margin-left:6px}
  .nudge{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);font-family:"Baloo 2";font-weight:800;font-size:16px;cursor:pointer;line-height:1}
  .nudge:active{transform:scale(.94)}
  .nudge-lbl{font-weight:700;font-size:11px;color:var(--ink-soft);margin-left:2px}
  .toggles2{display:flex;gap:20px;margin:4px 0 4px}
  .sheetbtns{display:flex;gap:10px;margin-top:18px}
  .btn.save{flex:1;background:linear-gradient(150deg,var(--berry),var(--berry-deep));color:#fff;padding:14px;font-size:16px}
  .btn.ghost{background:var(--card);border:1.5px solid var(--line);color:var(--ink-soft);padding:14px 18px;font-size:15px}
  .btn.danger{background:none;color:var(--berry-deep);border:none;font-family:"Baloo 2";font-weight:800;cursor:pointer;padding:10px;font-size:14px;width:100%;margin-top:4px}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-family:"Baloo 2";font-weight:700;padding:11px 18px;border-radius:999px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:60;font-size:14px}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brandrow">
      <div class="mark">🧃</div>
      <div>
        <h1>Packet Picker</h1>
        <div class="tag">Rate the water mixes. Let it choose for you.</div>
      </div>
      <div class="count"><b id="totalCount">0</b>packets</div>
    </div>

    <div class="actions">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Search brand or flavor…" autocomplete="off" />
      </div>
      <button class="btn pour" id="pourBtn">🥤 Pour me one</button>
      <button class="btn add" id="addBtn" title="Add packet" aria-label="Add packet">＋</button>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="filters" aria-label="Filters">
    <div class="frow">
      <div class="flabel">Purpose</div>
      <div class="chips" id="purposeChips"></div>
    </div>
    <div class="frow subrow">
      <div class="field grow">
        <div class="flabel">Brand</div>
        <select id="brandSelect"><option value="">All brands</option></select>
      </div>
      <div class="field grow">
        <div class="flabel">Sort</div>
        <select id="sortSelect">
          <option value="rating-desc">Highest rated</option>
          <option value="rating-asc">Lowest rated</option>
          <option value="flavor-asc">Flavor A–Z</option>
          <option value="brand-asc">Brand A–Z</option>
          <option value="added-desc">Recently added</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="flabel">Minimum rating · <span class="rngval" id="minRateVal">0</span></div>
      <input class="rng" id="minRate" type="range" min="0" max="5" step="0.25" value="0" />
    </div>
    <div class="frow toggle-block">
      <div class="toggle-col">
        <label class="toggle"><input type="checkbox" id="sugarFilter" /><span class="track"></span>Sugar free</label>
        <label class="toggle"><input type="checkbox" id="dyeFilter" /><span class="track"></span>Dye free</label>
      </div>
      <button class="clear" id="clearBtn">Reset</button>
    </div>
  </section>

  <div class="grid" id="grid"></div>
</main>

<div class="footbar">
  <div class="wrap">
    <button class="link" id="exportBtn">⤓ Export</button>
    <button class="link" id="importBtn">⤒ Import</button>
    <input type="file" id="importFile" accept="application/json" class="sr" />
    <span class="foot-count" id="footCount"></span>
  </div>
</div>

<!-- Add / edit sheet -->
<div class="scrim" id="scrim">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <h2 id="sheetTitle">Add a packet</h2>
    <div class="sub" id="sheetSub">The little things you dump in water.</div>

    <div class="two">
      <div class="fld"><label for="fBrand">Brand</label><input id="fBrand" type="text" placeholder="e.g. Starburst" autocomplete="off" list="brandList" /></div>
      <div class="fld"><label for="fFlavor">Flavor</label><input id="fFlavor" type="text" placeholder="e.g. cherry limeade" autocomplete="off" /></div>
    </div>
    <datalist id="brandList"></datalist>

    <div class="fld">
      <label for="fPurpose">Purpose</label>
      <select id="fPurpose"></select>
    </div>

    <div class="fld">
      <label>Rating</label>
      <div class="stars" id="starPick" role="slider" aria-label="Rating out of 5" tabindex="0" aria-valuemin="0" aria-valuemax="5" aria-valuenow="0"></div>
    </div>

    <div class="fld">
      <label for="fNotes">Notes</label>
      <textarea id="fNotes" placeholder="e.g. needs extra water, use light scoop…"></textarea>
    </div>

    <div class="toggles2">
      <label class="toggle"><input type="checkbox" id="fSugar" /><span class="track"></span>Sugar free</label>
      <label class="toggle"><input type="checkbox" id="fDye" /><span class="track"></span>Dye free</label>
    </div>

    <div class="sheetbtns">
      <button class="btn ghost" id="cancelBtn">Cancel</button>
      <button class="btn save" id="saveBtn">Save packet</button>
    </div>
    <button class="btn danger" id="deleteBtn" style="display:none">Delete this packet</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- purpose config ---------- */
const PURPOSES = [
  {key:"flavor",    label:"Flavor",    emoji:"🥤", bg:"#fbe6ee", fg:"#c73c64"},
  {key:"hydration", label:"Hydration", emoji:"💧", bg:"#e3f1fb", fg:"#2f7bb0"},
  {key:"calming",   label:"Calming",   emoji:"🌙", bg:"#eee9f7", fg:"#6a56a8"},
  {key:"energy",    label:"Energy",    emoji:"⚡", bg:"#fdf0dc", fg:"#c07d16"},
  {key:"protein",   label:"Protein",   emoji:"💪", bg:"#e5f3e8", fg:"#3c8a54"},
  {key:"other",     label:"Other",     emoji:"✨", bg:"#eef0ef", fg:"#6b6470"},
];
const P = Object.fromEntries(PURPOSES.map(p=>[p.key,p]));

/* ---------- seed data ---------- */
const SEED = [
  {brand:"Sonic",        flavor:"cherry limeade",               purpose:"flavor", rating:2,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"Welch's",      flavor:"strawberry peach",             purpose:"flavor", rating:3,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"Country Time", flavor:"lemonade",                     purpose:"flavor", rating:4,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"Welch's",      flavor:"pomegranate cherry",           purpose:"flavor", rating:5,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"Starburst",    flavor:"cherry",                       purpose:"flavor", rating:5,    notes:"extra water", sugarFree:false, dyeFree:false},
  {brand:"Starburst",    flavor:"pink",                         purpose:"flavor", rating:2,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"Jolly Rancher",flavor:"green",                        purpose:"flavor", rating:4,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"",             flavor:"ocean water",                  purpose:"flavor", rating:2,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"Starburst",    flavor:"duos (watermelon strawberry)", purpose:"flavor", rating:3.75, notes:"",            sugarFree:false, dyeFree:false},
  {brand:"Dole",         flavor:"orange pineapple",             purpose:"flavor", rating:3.75, notes:"just light",  sugarFree:false, dyeFree:false},
  {brand:"Dole",         flavor:"strawberry pineapple",         purpose:"flavor", rating:3.5,  notes:"",            sugarFree:false, dyeFree:false},
  {brand:"BetterGreens", flavor:"watermelon lime",              purpose:"energy", rating:5,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"BetterGreens", flavor:"pomegranate",                  purpose:"energy", rating:4,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"BetterGreens", flavor:"raspberry limeade",            purpose:"energy", rating:4,    notes:"",            sugarFree:false, dyeFree:false},
  {brand:"BetterGreens", flavor:"arctic pop",                   purpose:"energy", rating:4,    notes:"",            sugarFree:false, dyeFree:false},
];

/* ---------- storage ---------- */
const KEY = "packet-picker-v1";
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){const d = JSON.parse(raw); if(Array.isArray(d)&&d.length) return d;}
  }catch(e){}
  return SEED.map((s,i)=>({id:uid(),added:i,...s}));
}
function save(){
  try{localStorage.setItem(KEY, JSON.stringify(packets));}catch(e){}
}
let packets = load();

/* ---------- filter state ---------- */
const state = {search:"", purposes:new Set(), brand:"", sort:"rating-desc", minRate:0, sugar:false, dye:false};

/* ---------- helpers ---------- */
const $ = s=>document.querySelector(s);
const grid = $("#grid");
function cap(s){return s ? s.charAt(0).toUpperCase()+s.slice(1) : s}
function fmtRate(n){return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/0$/,"")}

/* ---------- build filter UI ---------- */
const purposeChips = $("#purposeChips");
PURPOSES.forEach(p=>{
  const b = document.createElement("button");
  b.className="chip"; b.type="button"; b.setAttribute("aria-pressed","false");
  b.dataset.key=p.key; b.innerHTML=`<span>${p.emoji}</span>${p.label}`;
  b.onclick=()=>{
    if(state.purposes.has(p.key)) state.purposes.delete(p.key); else state.purposes.add(p.key);
    b.setAttribute("aria-pressed", state.purposes.has(p.key));
    render();
  };
  purposeChips.appendChild(b);
});
const fPurpose = $("#fPurpose");
PURPOSES.forEach(p=>{
  const o=document.createElement("option"); o.value=p.key; o.textContent=`${p.emoji}  ${p.label}`; fPurpose.appendChild(o);
});

function refreshBrands(){
  const brands=[...new Set(packets.map(p=>p.brand).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  const sel=$("#brandSelect"); const cur=sel.value;
  sel.innerHTML='<option value="">All brands</option>'+brands.map(b=>`<option>${esc(b)}</option>`).join("");
  sel.value=cur;
  $("#brandList").innerHTML=brands.map(b=>`<option value="${esc(b)}">`).join("");
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

/* ---------- filtering ---------- */
function filtered(){
  let list = packets.filter(p=>{
    if(state.search){
      const q=state.search.toLowerCase();
      if(!(`${p.brand} ${p.flavor}`.toLowerCase().includes(q))) return false;
    }
    if(state.purposes.size && !state.purposes.has(p.purpose)) return false;
    if(state.brand && p.brand!==state.brand) return false;
    if(p.rating < state.minRate) return false;
    if(state.sugar && !p.sugarFree) return false;
    if(state.dye && !p.dyeFree) return false;
    return true;
  });
  const s=state.sort;
  list.sort((a,b)=>{
    if(s==="rating-desc") return b.rating-a.rating || a.flavor.localeCompare(b.flavor);
    if(s==="rating-asc")  return a.rating-b.rating || a.flavor.localeCompare(b.flavor);
    if(s==="flavor-asc")  return a.flavor.localeCompare(b.flavor);
    if(s==="brand-asc")   return (a.brand||"~").localeCompare(b.brand||"~") || a.flavor.localeCompare(b.flavor);
    if(s==="added-desc")  return (b.added||0)-(a.added||0);
    return 0;
  });
  return list;
}

/* ---------- render ---------- */
let spotId=null;
function render(){
  refreshBrands();
  $("#totalCount").textContent=packets.length;
  const list=filtered();
  $("#footCount").textContent=`${list.length} shown`;

  if(!list.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="big">🫗</div><h3>No packets match</h3><div>Loosen a filter, or add a new one with ＋.</div></div>`;
    return;
  }
  grid.innerHTML=list.map(p=>{
    const pu=P[p.purpose]||P.other;
    const pct=Math.max(0,Math.min(100,(p.rating/5)*100));
    const badges=[
      p.sugarFree?`<span class="badge">Sugar free</span>`:"",
      p.dyeFree?`<span class="badge dye">Dye free</span>`:""
    ].join("");
    return `<div class="card ${p.id===spotId?"spot":""}" data-id="${p.id}">
      <div class="cardbtns">
        <button class="icobtn edit" title="Edit" aria-label="Edit">✎</button>
      </div>
      <div class="eyebrow ${p.brand?"":"none"}">${p.brand?esc(p.brand):"no brand"}</div>
      <div class="flavor">${esc(p.flavor)}</div>
      <div class="meta">
        <span class="pchip" style="background:${pu.bg};color:${pu.fg}">${pu.emoji} ${pu.label}</span>
        ${badges}
      </div>
      <div class="rate">
        <span class="score">${fmtRate(p.rating)}<span class="out5"> /5</span></span>
        <span class="bar"><span style="width:${pct}%"></span></span>
      </div>
      ${p.notes?`<div class="notes">${esc(p.notes)}</div>`:""}
    </div>`;
  }).join("");

  grid.querySelectorAll(".card").forEach(c=>{
    const id=c.dataset.id;
    c.querySelector(".edit").onclick=e=>{e.stopPropagation(); openSheet(id);};
  });
}

/* ---------- randomize ---------- */
$("#pourBtn").onclick=()=>{
  const list=filtered();
  if(!list.length){toast("Nothing to pour — check your filters");return;}
  const pick=list[Math.floor(Math.random()*list.length)];
  spotId=pick.id;
  render();
  const el=grid.querySelector(`[data-id="${pick.id}"]`);
  if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
  toast(`🥤 ${pick.brand?pick.brand+" ":""}${pick.flavor}`);
};

/* ---------- sheet (add/edit) ---------- */
const scrim=$("#scrim");
let editId=null, pickedRating=0;

function buildStars(){
  const wrap=$("#starPick"); wrap.innerHTML="";
  for(let i=1;i<=5;i++){
    const s=document.createElement("span");
    s.className="star"; s.dataset.i=i; s.textContent="★";
    s.innerHTML=`★<span class="half">★</span>`;
    // tap left half = .5 below? We'll do: tap = full, long options via range. Simpler: click sets to i, click-again same -> i-.5? 
    s.addEventListener("click",ev=>{
      const rect=s.getBoundingClientRect();
      const half=(ev.clientX-rect.left) < rect.width/2;
      setRating(half ? i-0.5 : i);
    });
    wrap.appendChild(s);
  }
  const num=document.createElement("span"); num.className="ratenum"; num.id="ratenum"; wrap.appendChild(num);
  const minus=document.createElement("button"); minus.type="button"; minus.className="nudge"; minus.textContent="−";
  minus.title="Down 0.25"; minus.onclick=()=>setRating(pickedRating-0.25);
  const plus=document.createElement("button"); plus.type="button"; plus.className="nudge"; plus.textContent="+";
  plus.title="Up 0.25"; plus.onclick=()=>setRating(pickedRating+0.25);
  const lbl=document.createElement("span"); lbl.className="nudge-lbl"; lbl.textContent="±.25";
  wrap.appendChild(minus); wrap.appendChild(plus); wrap.appendChild(lbl);
  paintStars();
}
function setRating(v){pickedRating=Math.max(0,Math.min(5,Math.round(v*4)/4)); paintStars();}
function paintStars(){
  const stars=$("#starPick").querySelectorAll(".star");
  stars.forEach(s=>{
    const i=+s.dataset.i; s.classList.remove("full");
    const half=s.querySelector(".half"); half.style.width="0%";
    if(pickedRating>=i){s.classList.add("full");}
    else if(pickedRating>=i-0.5){half.style.width="50%";}
  });
  $("#ratenum").textContent=pickedRating?fmtRate(pickedRating):"—";
  $("#starPick").setAttribute("aria-valuenow",pickedRating);
}
$("#starPick").addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowUp"){setRating(pickedRating+0.25);e.preventDefault();}
  if(e.key==="ArrowLeft"||e.key==="ArrowDown"){setRating(pickedRating-0.25);e.preventDefault();}
});
buildStars();

function openSheet(id){
  editId=id||null;
  const del=$("#deleteBtn");
  if(id){
    const p=packets.find(x=>x.id===id);
    $("#sheetTitle").textContent="Edit packet";
    $("#sheetSub").textContent="Tweak the details or rating.";
    $("#fBrand").value=p.brand||""; $("#fFlavor").value=p.flavor||"";
    $("#fPurpose").value=p.purpose; $("#fNotes").value=p.notes||"";
    $("#fSugar").checked=!!p.sugarFree; $("#fDye").checked=!!p.dyeFree;
    setRating(p.rating||0);
    del.style.display="block";
  }else{
    $("#sheetTitle").textContent="Add a packet";
    $("#sheetSub").textContent="The little things you dump in water.";
    $("#fBrand").value=""; $("#fFlavor").value=""; $("#fPurpose").value="flavor";
    $("#fNotes").value=""; $("#fSugar").checked=false; $("#fDye").checked=false;
    setRating(0); del.style.display="none";
  }
  scrim.classList.add("on"); document.body.style.overflow="hidden";
  setTimeout(()=>$("#fFlavor").focus(),80);
}
function closeSheet(){scrim.classList.remove("on"); document.body.style.overflow="";}
$("#addBtn").onclick=()=>openSheet(null);
$("#cancelBtn").onclick=closeSheet;
scrim.onclick=e=>{if(e.target===scrim)closeSheet();};

$("#saveBtn").onclick=()=>{
  const flavor=$("#fFlavor").value.trim();
  if(!flavor){toast("Give it a flavor name");$("#fFlavor").focus();return;}
  const data={
    brand:$("#fBrand").value.trim(),
    flavor,
    purpose:$("#fPurpose").value,
    rating:pickedRating,
    notes:$("#fNotes").value.trim(),
    sugarFree:$("#fSugar").checked,
    dyeFree:$("#fDye").checked,
  };
  if(editId){
    const p=packets.find(x=>x.id===editId); Object.assign(p,data);
    toast("Saved");
  }else{
    packets.push({id:uid(),added:Math.max(0,...packets.map(p=>p.added||0))+1,...data});
    spotId=null; toast("Added 🎉");
  }
  save(); closeSheet(); render();
};
$("#deleteBtn").onclick=()=>{
  if(!editId)return;
  packets=packets.filter(x=>x.id!==editId);
  save(); closeSheet(); render(); toast("Deleted");
};

/* ---------- filter wiring ---------- */
$("#search").oninput=e=>{state.search=e.target.value;render();};
$("#brandSelect").onchange=e=>{state.brand=e.target.value;render();};
$("#sortSelect").onchange=e=>{state.sort=e.target.value;render();};
$("#minRate").oninput=e=>{state.minRate=+e.target.value;$("#minRateVal").textContent=fmtRate(+e.target.value);render();};
$("#sugarFilter").onchange=e=>{state.sugar=e.target.checked;render();};
$("#dyeFilter").onchange=e=>{state.dye=e.target.checked;render();};
$("#clearBtn").onclick=()=>{
  state.search="";state.purposes.clear();state.brand="";state.minRate=0;state.sugar=false;state.dye=false;
  $("#search").value="";$("#brandSelect").value="";$("#minRate").value=0;$("#minRateVal").textContent="0";
  $("#sugarFilter").checked=false;$("#dyeFilter").checked=false;
  purposeChips.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed","false"));
  spotId=null; render();
};

/* ---------- export / import ---------- */
$("#exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(packets,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="packets.json"; a.click();
  toast("Exported packets.json");
};
$("#importBtn").onclick=()=>$("#importFile").click();
$("#importFile").onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!Array.isArray(d))throw 0;
      packets=d.map((p,i)=>({id:p.id||uid(),added:p.added??i,brand:p.brand||"",flavor:p.flavor||"",purpose:P[p.purpose]?p.purpose:"other",rating:+p.rating||0,notes:p.notes||"",sugarFree:!!p.sugarFree,dyeFree:!!p.dyeFree}));
      save(); render(); toast(`Imported ${packets.length}`);
    }catch(err){toast("That file didn't look right");}
  };
  r.readAsText(f); e.target.value="";
};

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("on");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),2200);
}

/* ---------- keyboard ---------- */
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&scrim.classList.contains("on"))closeSheet();});

render();
</script>
</body>
